version: "3.8"

# Self-contained deployment (API + Postgres). Production typically uses Neon + Upstash
# via backend/.env instead of a bundled Postgres. All secrets come from backend/.env
# (gitignored) — never hardcode credentials here.

services:
  app:
    image: probalance-backend:latest
    container_name: probalance-app
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - probalance-net

  postgres:
    image: postgres:15
    container_name: probalance-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in backend/.env}
      POSTGRES_DB: ${POSTGRES_DB:-probalance}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - probalance-net

volumes:
  pgdata:

networks:
  probalance-net:
    driver: bridge
