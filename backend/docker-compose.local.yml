version: "3.8"

services:
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"
    restart: unless-stopped
    networks:
      - webvirtus-net

  postgres:
    image: postgres:15
    container_name: postgres-demo-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: user1234
      POSTGRES_DB: demo_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/libpostgresql/data

volumns:
  pgdata:

networks:
  webvirtus-net:
    driver: bridge
