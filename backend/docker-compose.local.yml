version: "3.8"

# Local development database. Production uses Neon (Postgres) + Upstash (Redis).
# Set POSTGRES_PASSWORD in backend/.env (gitignored) — compose reads it automatically.

services:
  postgres:
    image: postgres:15
    container_name: fine-balance-sheet-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in backend/.env}
      POSTGRES_DB: ${POSTGRES_DB:-fine_balance_sheet}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - fine-balance-sheet-net

volumes:
  pgdata:

networks:
  fine-balance-sheet-net:
    driver: bridge
